name: Publish npm package

on:
  push:
    branches:
      - dev
      - prod
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: production
        type: choice
        options:
          - production
          - development
      version:
        description: "npm version bump strategy"
        required: true
        default: patch
        type: choice
        options:
          - prerelease
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip publish]')
    environment:
      name: ${{ ((github.event_name == 'workflow_dispatch' && inputs.channel == 'production') || github.ref_name == 'prod') && 'npm-production' || 'npm-development' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Resolve release channel
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.channel }}" = "production" ]; then
              echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
              echo "preid=" >> "$GITHUB_OUTPUT"
            else
              echo "dist_tag=next" >> "$GITHUB_OUTPUT"
              echo "preid=dev" >> "$GITHUB_OUTPUT"
            fi
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "prod" ]; then
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
            echo "version=patch" >> "$GITHUB_OUTPUT"
            echo "preid=" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=next" >> "$GITHUB_OUTPUT"
            echo "version=prerelease" >> "$GITHUB_OUTPUT"
            echo "preid=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump package version
        shell: bash
        run: |
          if [ "${{ steps.release.outputs.version }}" = "prerelease" ]; then
            npm version prerelease --preid "${{ steps.release.outputs.preid || 'dev' }}" --no-git-tag-version
          else
            npm version "${{ steps.release.outputs.version }}" --no-git-tag-version
          fi

      - name: Validate package
        run: npm run validate:package

      - name: Verify npm auth
        run: npm whoami --registry https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check npm version availability
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          set +e
          NPM_VIEW_OUTPUT="$(npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry https://registry.npmjs.org/ 2>&1)"
          NPM_VIEW_STATUS=$?
          set -e
          if [ "$NPM_VIEW_STATUS" -eq 0 ]; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npm."
            exit 1
          fi
          if ! echo "$NPM_VIEW_OUTPUT" | grep -q "E404"; then
            echo "Could not verify npm availability for ${PACKAGE_NAME}@${PACKAGE_VERSION}."
            echo "$NPM_VIEW_OUTPUT"
            exit 1
          fi

      - name: Dry-run publish
        run: npm publish --dry-run --access public --tag "${{ steps.release.outputs.dist_tag }}" --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish package
        run: npm publish --access public --provenance --tag "${{ steps.release.outputs.dist_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit published version
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="$(node -p "require('./package.json').version")"
          git add package.json package-lock.json
          git commit -m "chore(release): publish ${VERSION} [skip ci] [skip publish]"
          git push origin "HEAD:${{ github.ref_name }}"

name: Publish npm package

on:
  push:
    branches:
      - dev
      - prod
  workflow_dispatch:
    inputs:
      dist-tag:
        description: "npm dist-tag to publish"
        required: true
        default: next
        type: choice
        options:
          - next
          - latest
      version:
        description: "npm version bump strategy"
        required: true
        default: prerelease
        type: choice
        options:
          - prerelease
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip publish]')
    environment:
      name: ${{ github.ref_name == 'prod' && 'npm-production' || 'npm-development' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate package
        run: npm run validate:package

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve release channel
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "dist_tag=${{ inputs['dist-tag'] }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "prod" ]; then
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
            echo "version=patch" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=next" >> "$GITHUB_OUTPUT"
            echo "version=prerelease" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump package version
        shell: bash
        run: |
          if [ "${{ steps.release.outputs.version }}" = "prerelease" ]; then
            npm version prerelease --preid dev --no-git-tag-version
          else
            npm version "${{ steps.release.outputs.version }}" --no-git-tag-version
          fi

      - name: Commit version bump
        shell: bash
        run: |
          git add package.json package-lock.json
          git commit -m "chore(release): bump version [skip ci] [skip publish]"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Publish package
        run: npm publish --access public --provenance --tag "${{ steps.release.outputs.dist_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

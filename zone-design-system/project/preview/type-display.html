<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.row { display: grid; grid-template-columns: 90px 1fr; gap: 14px; align-items: baseline; padding: 8px 0; border-bottom: 1px dashed var(--phosphor-fade); }
.row:last-child { border-bottom: none; }
.tag { font-family: var(--font-terminal); font-size: 11px; color: var(--phosphor-fade); letter-spacing: 0.18em; text-transform: uppercase; }
.h1 { font-family: var(--font-heading); font-weight: 700; font-size: 28px; line-height: 1.05; letter-spacing: 0.04em; text-transform: uppercase; color: var(--phosphor-bright); text-shadow: var(--glow-emerald); }
.h2 { font-family: var(--font-heading); font-weight: 700; font-size: 22px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--phosphor-bright); text-shadow: var(--glow-emerald); }
.h3 { font-family: var(--font-heading); font-weight: 700; font-size: 17px; color: #62ff9a; text-shadow: var(--glow-magenta); letter-spacing: 0.04em; }
</style></head>
<body>
<div class="row"><span class="tag">H1 / 28</span><span class="h1">// CLEARANCE: ОДИНОЧКА</span></div>
<div class="row"><span class="tag">H2 / 22</span><span class="h2">// transmission log</span></div>
<div class="row"><span class="tag">H3 / 17</span><span class="h3">▸ install neovim</span></div>
</body></html>

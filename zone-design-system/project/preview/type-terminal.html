<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.tt { font-family: "VT323", ui-monospace, monospace; color: var(--phosphor); text-shadow: var(--glow-emerald); }
.row { display: grid; grid-template-columns: 100px 1fr; gap: 14px; align-items: baseline; padding: 6px 0; border-bottom: 1px dashed var(--phosphor-fade); }
.row:last-child { border-bottom: none; }
.tag { font-family: var(--font-terminal); font-size: 11px; color: var(--phosphor-fade); letter-spacing: 0.18em; text-transform: uppercase; }
.s32 { font-size: 32px; line-height: 1; }
.s22 { font-size: 22px; line-height: 1.1; }
.s16 { font-size: 16px; line-height: 1.3; color: var(--phosphor-bright); }
.glyphs { font-size: 18px; letter-spacing: 0.04em; color: var(--phosphor-bright); }
.note { font-family: var(--font-code); font-size: 10.5px; color: var(--phosphor-fade); letter-spacing: 0.14em; text-transform: uppercase; margin-top: 6px; }
</style></head>
<body>
<div class="row"><span class="tag">VT323 / 32</span><span class="tt s32">~/zone-net $ whoami</span></div>
<div class="row"><span class="tag">VT323 / 22</span><span class="tt s22">// СЕКТОР-7 // ПРИЁМ // 14 мкР/ч</span></div>
<div class="row"><span class="tag">VT323 / 16</span><span class="tt s16">press \\ · click ▸/▾ to fold · :NERDTree</span></div>
<div class="row"><span class="tag">glyphs</span><span class="tt glyphs">▌ ▸ ▾ ▮ ▯ █ ▓ ▒ ░ ☢ ◇ │ ┌ ─ ┐ └ ┘ ╔ ═ ╗ ║</span></div>
<p class="note">Local brand file · fonts/VT323-Regular.ttf</p>
</body></html>

<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.sw {
  border: 1px solid var(--phosphor-fade);
  background: var(--bg-raise);
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.chip { height: 56px; border: 1px solid var(--phosphor-fade); }
.name {
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--phosphor-bright);
  text-shadow: var(--glow-emerald);
}
.hex { font-family: var(--font-code); font-size: 10.5px; color: var(--phosphor-dim); }
</style></head>
<body>
<div class="swatches">
  <div class="sw"><div class="chip" style="background:#62ff9a"></div><div class="name">accent</div><div class="hex">#62ff9a</div></div>
  <div class="sw"><div class="chip" style="background:#d6ffe2"></div><div class="name">accent / bright</div><div class="hex">#d6ffe2</div></div>
  <div class="sw"><div class="chip" style="background:#157a3b"></div><div class="name">accent / deep</div><div class="hex">#157a3b</div></div>
  <div class="sw"><div class="chip" style="background:#06321a"></div><div class="name">accent / fade</div><div class="hex">#06321a</div></div>
</div>
</body></html>

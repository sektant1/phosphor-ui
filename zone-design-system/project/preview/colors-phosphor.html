<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.sw {
  border: 1px solid var(--phosphor-fade);
  background: var(--bg-raise);
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.chip { height: 56px; border: 1px solid var(--phosphor-fade); }
.name {
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--phosphor-bright);
  text-shadow: var(--glow-emerald);
}
.hex {
  font-family: var(--font-code);
  font-size: 10.5px;
  color: var(--phosphor-dim);
}
</style></head>
<body>
<div class="swatches">
  <div class="sw">
    <div class="chip" style="background:#2cff7a;box-shadow:inset 0 0 24px rgba(44,255,122,0.5)"></div>
    <div class="name">phosphor</div>
    <div class="hex">#2cff7a</div>
  </div>
  <div class="sw">
    <div class="chip" style="background:#b6ffce"></div>
    <div class="name">phosphor / bright</div>
    <div class="hex">#b6ffce</div>
  </div>
  <div class="sw">
    <div class="chip" style="background:#1fb854"></div>
    <div class="name">phosphor / dim</div>
    <div class="hex">#1fb854</div>
  </div>
  <div class="sw">
    <div class="chip" style="background:#0a4d22"></div>
    <div class="name">phosphor / fade</div>
    <div class="hex">#0a4d22</div>
  </div>
</div>
</body></html>

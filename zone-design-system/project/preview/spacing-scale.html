<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.list { display: grid; gap: 6px; }
.item { display: grid; grid-template-columns: 48px 1fr 90px; gap: 14px; align-items: center; }
.box { height: 36px; background: rgba(44,255,122,0.08); border: 1px solid var(--phosphor-fade); }
.tok { font-family: var(--font-code); font-size: 11.5px; color: var(--phosphor-bright); }
.size { font-family: var(--font-code); font-size: 11px; color: var(--phosphor-dim); text-align: right; }
</style></head>
<body>
<div class="list">
  <div class="item"><div class="box" style="width:3.2px"></div><div class="tok">--space-1</div><div class="size">0.2rem · 3.2px</div></div>
  <div class="item"><div class="box" style="width:6.4px"></div><div class="tok">--space-2</div><div class="size">0.4rem · 6.4px</div></div>
  <div class="item"><div class="box" style="width:9.6px"></div><div class="tok">--space-3</div><div class="size">0.6rem · 9.6px</div></div>
  <div class="item"><div class="box" style="width:12.8px"></div><div class="tok">--space-4</div><div class="size">0.8rem · 12.8px</div></div>
  <div class="item"><div class="box" style="width:16px"></div><div class="tok">--space-5</div><div class="size">1.0rem · 16px</div></div>
  <div class="item"><div class="box" style="width:22.4px"></div><div class="tok">--space-6</div><div class="size">1.4rem · 22.4px</div></div>
  <div class="item"><div class="box" style="width:32px"></div><div class="tok">--space-7</div><div class="size">2.0rem · 32px</div></div>
</div>
</body></html>

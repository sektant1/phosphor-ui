<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.code-demo {
  border: 1px solid var(--phosphor-fade);
  background: #03110a;
  padding: 14px 16px;
  font-family: var(--font-code);
  font-size: 12px;
  line-height: 1.65;
  white-space: pre;
  overflow: hidden;
  box-shadow: inset 0 0 24px rgba(44,255,122,0.04);
}
.t-comment { color: #3a7a52; font-style: italic; }
.t-keyword { color: #62ff9a; }
.t-fn { color: #b6ffce; }
.t-string { color: #00d4b5; }
.t-number { color: #aaff66; }
.t-var { color: #d6ffe2; }
.t-type { color: #5cf5d4; }
.t-punct { color: #4d8a6e; }
</style></head>
<body>
<div class="code-demo"><span class="t-comment">// scan radio band</span>
<span class="t-keyword">async function</span> <span class="t-fn">scan</span><span class="t-punct">(</span><span class="t-var">freq</span><span class="t-punct">:</span> <span class="t-type">number</span><span class="t-punct">)</span> <span class="t-punct">{</span>
  <span class="t-keyword">const</span> <span class="t-var">band</span> <span class="t-punct">=</span> <span class="t-string">"VLF"</span><span class="t-punct">;</span>
  <span class="t-keyword">const</span> <span class="t-var">rad</span> <span class="t-punct">=</span> <span class="t-number">14</span><span class="t-punct">;</span> <span class="t-comment">// µR/h</span>
  <span class="t-keyword">return</span> <span class="t-punct">{</span> <span class="t-var">band</span><span class="t-punct">,</span> <span class="t-var">freq</span><span class="t-punct">,</span> <span class="t-var">rad</span> <span class="t-punct">}</span><span class="t-punct">;</span>
<span class="t-punct">}</span></div>
</body></html>

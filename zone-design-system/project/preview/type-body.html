<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.row { display: grid; grid-template-columns: 90px 1fr; gap: 14px; align-items: baseline; padding: 8px 0; border-bottom: 1px dashed var(--phosphor-fade); }
.row:last-child { border-bottom: none; }
.tag { font-family: var(--font-terminal); font-size: 11px; color: var(--phosphor-fade); letter-spacing: 0.18em; text-transform: uppercase; }
.body { font-family: var(--font-body); font-size: 14px; line-height: 1.6; color: var(--ink); }
.mono-inline { font-family: var(--font-code); font-size: 11.5px; color: var(--phosphor-bright); background: rgba(44,255,122,0.06); border: 1px solid var(--phosphor-fade); padding: 1px 5px; }
.term { font-family: 'VT323', monospace; font-size: 17px; letter-spacing: 0.06em; color: var(--phosphor); text-shadow: var(--glow-emerald); }
</style></head>
<body>
<div class="row"><span class="tag">BODY / 14</span><span class="body">when you compare the out-of-the-box neovim experience with vscode, your first impression would probably be: <em>"how tf will i be more productive with this?"</em></span></div>
<div class="row"><span class="tag">MONO / 11</span><span><span class="mono-inline">$ npm run new my-first-report</span> <span class="mono-inline">CH 0x1D</span></span></div>
<div class="row"><span class="tag">VT323 / 17</span><span class="term">~/zone-net $ grep -r 'transmission' ./reports/</span></div>
</body></html>

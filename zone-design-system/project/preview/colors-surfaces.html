<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.sw { border: 1px solid var(--phosphor-fade); padding: 10px; display: flex; flex-direction: column; gap: 6px; }
.chip { height: 56px; border: 1px solid var(--phosphor-fade); }
.name {
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--phosphor-bright);
  text-shadow: var(--glow-emerald);
}
.hex { font-family: var(--font-code); font-size: 10.5px; color: var(--phosphor-dim); }
</style></head>
<body>
<div class="swatches">
  <div class="sw" style="background:#04140a"><div class="chip" style="background:#04140a"></div><div class="name">--bg</div><div class="hex">#04140a</div></div>
  <div class="sw" style="background:#082416"><div class="chip" style="background:#082416"></div><div class="name">--bg-raise</div><div class="hex">#082416</div></div>
  <div class="sw" style="background:#010604"><div class="chip" style="background:#010604"></div><div class="name">--bg-deep</div><div class="hex">#010604</div></div>
  <div class="sw"><div class="chip" style="background:#d8ffe7"></div><div class="name">--ink</div><div class="hex">#d8ffe7</div></div>
</div>
</body></html>

<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.listing-header {
  display: grid;
  grid-template-columns: 2ch 11ch 2ch 1fr 8ch;
  gap: 0.9ch;
  padding: 0.3rem 0.6rem;
  background: var(--bg-raise);
  color: var(--phosphor-dim);
  border: 1px solid var(--phosphor-fade);
  border-bottom: none;
  font-family: var(--font-code);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.listing-header .h-glyph,
.listing-header .h-sep { visibility: hidden; }
.post-list { list-style: none; margin: 0; padding: 0; border: 1px solid var(--phosphor-fade); }
.post-row { border-top: 1px dashed var(--magenta-fade); }
.post-row:first-child { border-top: none; }
.post-row a {
  display: grid;
  grid-template-columns: 2ch 11ch 2ch 1fr 8ch;
  gap: 0.9ch;
  align-items: baseline;
  padding: 0.5rem 0.6rem;
  text-decoration: none;
  color: var(--ink);
  font-family: var(--font-code);
  font-size: 12px;
}
.row-glyph { color: var(--phosphor); text-shadow: var(--glow-emerald); }
.row-date { color: var(--phosphor-dim); font-size: 11px; }
.row-sep { color: var(--magenta-deep); }
.row-title { color: var(--phosphor-bright); text-shadow: var(--glow-emerald); letter-spacing: 0.04em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.row-meta { color: var(--phosphor-fade); font-size: 11px; text-align: right; }
.post-row a:hover, .post-row.hover a { background: #62ff9a; color: var(--bg); text-shadow: none; }
.post-row.hover .row-title,
.post-row.hover .row-date,
.post-row.hover .row-glyph,
.post-row.hover .row-sep,
.post-row.hover .row-meta { color: var(--bg-raise); text-shadow: none; }
</style></head>
<body>
<div class="listing-header">
  <span class="h-glyph">▌</span><span>DATA</span><span class="h-sep">::</span><span>POST</span><span>LENGTH</span>
</div>
<ul class="post-list">
  <li class="post-row"><a><span class="row-glyph">▌</span><span class="row-date">2026-03-31</span><span class="row-sep">::</span><span class="row-title">neovim zero to hero ide</span><span class="row-meta">~9 м</span></a></li>
  <li class="post-row hover"><a><span class="row-glyph">▌</span><span class="row-date">2026-02-14</span><span class="row-sep">::</span><span class="row-title">touch-typing &amp; the wrist pain doctrine</span><span class="row-meta">~4 м</span></a></li>
  <li class="post-row"><a><span class="row-glyph">▌</span><span class="row-date">2026-01-05</span><span class="row-sep">::</span><span class="row-title">building a static site generator in 600 LOC</span><span class="row-meta">~12 м</span></a></li>
</ul>
</body></html>
